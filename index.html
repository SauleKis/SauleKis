<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск туров — Сентябрь 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #222; }

    header {
      background: linear-gradient(135deg, #1a4fa0, #2e86de);
      color: white;
      text-align: center;
      padding: 50px 20px 30px;
    }
    header h1 { font-size: 2.2rem; margin-bottom: 8px; }
    header p { font-size: 1rem; opacity: 0.85; }

    /* ── ПОИСК ── */
    .search-bar {
      background: white;
      border-radius: 14px;
      padding: 28px 28px 24px;
      max-width: 900px;
      margin: -28px auto 0;
      position: relative;
      z-index: 10;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    }
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .search-row input {
      flex: 1;
      padding: 13px 18px;
      border: 2px solid #dde3f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-row input:focus { border-color: #2e86de; }
    .search-row button {
      padding: 13px 26px;
      background: #1a4fa0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-row button:hover { background: #163d80; }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filters select, .filters input[type=range] {
      padding: 9px 14px;
      border: 2px solid #dde3f0;
      border-radius: 8px;
      font-size: 0.88rem;
      background: #f7f9ff;
      cursor: pointer;
      outline: none;
    }
    .filters select:focus { border-color: #2e86de; }
    .filter-label { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 6px; }
    .budget-filter { display: flex; align-items: center; gap: 10px; }
    .budget-filter span { font-size: 0.88rem; color: #444; min-width: 80px; font-weight: 600; }
    .reset-btn {
      padding: 9px 16px;
      background: #f0f4f8;
      color: #666;
      border: 2px solid #dde3f0;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .reset-btn:hover { background: #e0e6f0; }

    /* ── КОНТЕЙНЕР ── */
    .container { max-width: 960px; margin: 0 auto; padding: 30px 20px 50px; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .results-count { color: #555; font-size: 0.9rem; }
    .sort-select {
      padding: 7px 14px;
      border: 2px solid #dde3f0;
      border-radius: 8px;
      font-size: 0.88rem;
      background: white;
      cursor: pointer;
    }

    /* ── КАРТОЧКИ ТУРОВ ── */
    #tours-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    .tour-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .tour-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
    .tour-card.hidden { display: none; }

    .card-img {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .card-body { padding: 18px; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 12px;
      font-weight: 600;
    }
    .tag.beach { background: #e0f2fe; color: #0277bd; }
    .tag.kids { background: #e8f5e9; color: #2e7d32; }
    .tag.ai { background: #fff3e0; color: #e65100; }
    .tag.excursion { background: #f3e5f5; color: #6a1b9a; }
    .tag.history { background: #fce4ec; color: #880e4f; }

    .card-body h3 { font-size: 1rem; margin-bottom: 6px; color: #1a4fa0; }
    .card-body .location { font-size: 0.83rem; color: #888; margin-bottom: 8px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .card-price { font-size: 1.1rem; font-weight: 700; color: #1a4fa0; }
    .card-rating { font-size: 0.85rem; color: #f5a623; font-weight: 600; }
    .card-nights { font-size: 0.8rem; color: #888; }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      grid-column: 1 / -1;
    }
    .no-results span { font-size: 3rem; display: block; margin-bottom: 14px; }

    footer { text-align: center; padding: 30px 20px; color: #aaa; font-size: 0.83rem; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .search-row { flex-direction: column; }
      .filters { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>✈️ Поиск туров</h1>
  <p>Найди идеальный отдых для всей семьи</p>
</header>

<!-- ПОИСК И ФИЛЬТРЫ -->
<div class="search-bar">
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Поиск по названию, курорту, стране..." oninput="applyFilters()">
    <button onclick="applyFilters()">🔍 Найти</button>
  </div>
  <div class="filters">
    <select id="filter-country" onchange="applyFilters()">
      <option value="">🌍 Все страны</option>
      <option value="Турция">🇹🇷 Турция</option>
      <option value="Египет">🇪🇬 Египет</option>
      <option value="Таиланд">🇹🇭 Таиланд</option>
      <option value="ОАЭ">🇦🇪 ОАЭ</option>
      <option value="Греция">🇬🇷 Греция</option>
    </select>

    <select id="filter-type" onchange="applyFilters()">
      <option value="">🏖️ Все типы</option>
      <option value="beach">Пляжный</option>
      <option value="kids">С детьми</option>
      <option value="excursion">Экскурсии</option>
      <option value="history">История</option>
    </select>

    <select id="filter-nights" onchange="applyFilters()">
      <option value="">📅 Любой срок</option>
      <option value="7">7 ночей</option>
      <option value="10">10 ночей</option>
      <option value="14">14 ночей</option>
    </select>

    <div class="budget-filter">
      <span class="filter-label">💰 до</span>
      <input type="range" id="filter-budget" min="500" max="6000" step="100" value="6000" oninput="updateBudget()">
      <span id="budget-val">$6 000</span>
    </div>

    <button class="reset-btn" onclick="resetFilters()">✕ Сбросить</button>
  </div>
</div>

<div class="container">
  <div class="results-header">
    <div class="results-count" id="results-count">Найдено туров: <b>9</b></div>
    <select class="sort-select" onchange="applyFilters()">
      <option value="price-asc">Цена: по возрастанию</option>
      <option value="price-desc">Цена: по убыванию</option>
      <option value="rating">По рейтингу</option>
    </select>
  </div>

  <div id="tours-list"></div>
</div>

<footer>
  Туры актуальны на июнь 2026 &nbsp;•&nbsp; github.com/SauleKis/SauleKis
</footer>

<script>
const tours = [
  {
    id: 1, name: "Selectum Family Side 5*", country: "Турция", resort: "Сиде",
    price: 3200, nights: 7, rating: 4.9, stars: 5,
    tags: ["beach","kids","ai"],
    desc: "Новый семейный отель с аквапарком, детским клубом и лунапарком.",
    emoji: "🏖️", bg: "#e0f2fe"
  },
  {
    id: 2, name: "Voyage Sorgun 5*", country: "Турция", resort: "Сиде",
    price: 3750, nights: 7, rating: 4.8, stars: 5,
    tags: ["beach","kids","ai"],
    desc: "Огромная территория в сосновом лесу у моря, 5+ бассейнов.",
    emoji: "🌲", bg: "#e8f5e9"
  },
  {
    id: 3, name: "Selectum Family Belek 5*", country: "Турция", resort: "Белек",
    price: 4100, nights: 7, rating: 4.7, stars: 5,
    tags: ["beach","kids","excursion","ai"],
    desc: "Рядом с парком The Land of Legends. Трансфер в парк включён.",
    emoji: "🎡", bg: "#f3e5f5"
  },
  {
    id: 4, name: "Rixos Premium Belek 5*", country: "Турция", resort: "Белек",
    price: 5500, nights: 7, rating: 5.0, stars: 5,
    tags: ["beach","kids","ai"],
    desc: "Флагманский курорт Rixos с частным пляжем и премиум-сервисом.",
    emoji: "👑", bg: "#fff3e0"
  },
  {
    id: 5, name: "Titanic Beach Lara 5*", country: "Турция", resort: "Анталья",
    price: 2800, nights: 7, rating: 4.6, stars: 5,
    tags: ["beach","kids","ai"],
    desc: "Известный отель на пляже Лара, отличная анимация для детей.",
    emoji: "🌅", bg: "#fce4ec"
  },
  {
    id: 6, name: "Pickalbatros Aqua Park 5*", country: "Египет", resort: "Хургада",
    price: 2200, nights: 7, rating: 4.5, stars: 5,
    tags: ["beach","kids","ai"],
    desc: "Огромный аквапарк на территории, прямо у Красного моря.",
    emoji: "🐠", bg: "#e0f7fa"
  },
  {
    id: 7, name: "Centara Grand 5*", country: "Таиланд", resort: "Краби",
    price: 3900, nights: 10, rating: 4.8, stars: 5,
    tags: ["beach","kids","excursion"],
    desc: "Скалы, джунгли и лазурное море. Экскурсии на острова включены.",
    emoji: "🏝️", bg: "#e8f5e9"
  },
  {
    id: 8, name: "Atlantis The Palm 5*", country: "ОАЭ", resort: "Дубай",
    price: 5800, nights: 7, rating: 4.9, stars: 5,
    tags: ["beach","kids","excursion","ai"],
    desc: "Легендарный отель с огромным аквапарком Aquaventure.",
    emoji: "🌴", bg: "#fff8e1"
  },
  {
    id: 9, name: "Ikos Oceania 5*", country: "Греция", resort: "Халкидики",
    price: 4400, nights: 10, rating: 4.9, stars: 5,
    tags: ["beach","kids","history","ai"],
    desc: "Роскошный греческий курорт, рядом с монастырями Афона.",
    emoji: "🏛️", bg: "#e8eaf6"
  },
];

const tagLabels = { beach: "Пляж", kids: "Дети", ai: "All Inclusive", excursion: "Экскурсии", history: "История" };

function renderCard(t) {
  const tagHTML = t.tags.map(tag => `<span class="tag ${tag}">${tagLabels[tag]}</span>`).join('');
  return `
    <div class="tour-card" id="tour-${t.id}" data-price="${t.price}" data-rating="${t.rating}" data-nights="${t.nights}" data-country="${t.country}" data-tags="${t.tags.join(',')}">
      <div class="card-img" style="background:${t.bg}">${t.emoji}</div>
      <div class="card-body">
        <div class="card-tags">${tagHTML}</div>
        <h3>${t.name}</h3>
        <div class="location">📍 ${t.resort}, ${t.country} &nbsp;·&nbsp; ${t.nights} ночей</div>
        <p style="font-size:0.85rem;color:#555;line-height:1.5">${t.desc}</p>
        <div class="card-meta">
          <div>
            <div class="card-price">$${t.price.toLocaleString()}</div>
            <div class="card-nights">на 4 чел. / ${t.nights} ночей</div>
          </div>
          <div class="card-rating">★ ${t.rating}</div>
        </div>
      </div>
    </div>`;
}

function renderAll(list) {
  document.getElementById('tours-list').innerHTML =
    list.length
      ? list.map(renderCard).join('')
      : `<div class="no-results"><span>🔍</span>Туры не найдены.<br>Попробуй изменить фильтры.</div>`;
  document.getElementById('results-count').innerHTML = `Найдено туров: <b>${list.length}</b>`;
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const country = document.getElementById('filter-country').value;
  const type = document.getElementById('filter-type').value;
  const nights = document.getElementById('filter-nights').value;
  const budget = parseInt(document.getElementById('filter-budget').value);
  const sort = document.querySelector('.sort-select').value;

  let result = tours.filter(t => {
    if (q && !t.name.toLowerCase().includes(q) && !t.resort.toLowerCase().includes(q) && !t.country.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return false;
    if (country && t.country !== country) return false;
    if (type && !t.tags.includes(type)) return false;
    if (nights && t.nights !== parseInt(nights)) return false;
    if (t.price > budget) return false;
    return true;
  });

  if (sort === 'price-asc') result.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') result.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') result.sort((a,b) => b.rating - a.rating);

  renderAll(result);
}

function updateBudget() {
  const val = document.getElementById('filter-budget').value;
  document.getElementById('budget-val').textContent = '$' + parseInt(val).toLocaleString();
  applyFilters();
}

function resetFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-country').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('filter-nights').value = '';
  document.getElementById('filter-budget').value = 6000;
  document.getElementById('budget-val').textContent = '$6 000';
  applyFilters();
}

// Первая отрисовка
renderAll(tours);
</script>
</body>
</html>
